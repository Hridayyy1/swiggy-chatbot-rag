<!DOCTYPE html>
<html>

<head>

    <title>Swiggy Annual Report Chatbot</title>

    <style>
        body {
            font-family: "Segoe UI", Arial;
            background: linear-gradient(135deg, #fff3e6, #ffe2d1);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Chatbox */

        .chatbox {
            width: 480px;
            height: 700px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */

        .header {
            background: linear-gradient(135deg, #ff5200, #ff7a33);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Messages area */

        .messages {
            flex: 1;
            padding: 22px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
            background: #fafafa;
        }

        /* Chat bubble */

        .message {
            max-width: 75%;
            padding: 14px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
            font-weight: 600;
            animation: fadeIn 0.25s ease-in;
        }

        /* User message */

        .user {
            align-self: flex-end;
            background: #ff5200;
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 10px rgba(255, 82, 0, 0.25);
        }

        /* Bot message */

        .bot {
            align-self: flex-start;
            background: #f1f3f5;
            color: #222;
            border-bottom-left-radius: 4px;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
        }

        /* Input area */

        .input-area {
            display: flex;
            padding: 12px;
            background: white;
            border-top: 1px solid #eee;
            gap: 10px;
        }

        /* Input box */

        input {
            flex: 1;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #ff5200;
            box-shadow: 0 0 0 2px rgba(255, 82, 0, 0.15);
        }

        /* Send button */

        button {
            background: #ff5200;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 18px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #e64800;
            transform: scale(1.05);
        }

        /* Typing indicator */

        .loading {
            font-size: 14px;
            color: #666;
            font-weight: 600;
            font-style: italic;
        }

        /* Animation */

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

</head>

<body>

    <div class="chatbox">

        <div class="header">
            Swiggy Annual Report Chatbot
        </div>

        <div class="messages" id="messages"></div>

        <div class="input-area">
            <input id="input" placeholder="Ask about Swiggy's annual report..." />
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

    <script>

        const input = document.getElementById("input")

        input.addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                sendMessage()
            }
        })

        async function sendMessage() {

            let message = input.value.trim()

            if (!message) return

            const messages = document.getElementById("messages")

            messages.innerHTML += `<div class="message user"><b>${message}</b></div>`

            input.value = ""

            messages.innerHTML += `<div class="message bot loading" id="loading">Thinking...</div>`

            messages.scrollTop = messages.scrollHeight

            let response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message })
            })

            let data = await response.json()

            document.getElementById("loading").remove()

            messages.innerHTML += `<div class="message bot"><b>${data.response}</b></div>`

            messages.scrollTop = messages.scrollHeight

        }

    </script>

</body>

</html>
